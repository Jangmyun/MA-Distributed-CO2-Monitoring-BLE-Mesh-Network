# ── I2C + Sensor ────────────────────────────────────────────────────────────
CONFIG_I2C=y
CONFIG_PINCTRL=y
CONFIG_SENSOR=y
CONFIG_ADXL345=y

# ── BLE Mesh ─────────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_MESH=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MESH_RELAY=y
CONFIG_BT_MESH_GATT_PROXY=y
CONFIG_BT_MESH_PB_GATT=y
# MESSAGE_LENGTH=90 → BUF = OP(3) + payload(91) + MIC_SHORT(4) = 98 bytes
# ceil(98/12) = 9 segments required
CONFIG_BT_MESH_TX_SEG_MAX=9
CONFIG_BT_MESH_RX_SEG_MAX=9
# 동시 세그먼트 TX 컨텍스트 수 (기본 1 → EBUSY 방지)
CONFIG_BT_MESH_TX_SEG_MSG_COUNT=2

# ── Persistent storage (Mesh 네트워크 키 / 주소 Flash 저장) ──────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# ── Shell (UART provisioning 명령 + model_handler 디버그 출력) ────────────────
# SHELL_BACKEND_UART 는 nRF52840 DK 기본 defconfig에서 자동 활성화된다.
CONFIG_SHELL=y

# ── DK library (OOB 프로비저닝 버튼 + attention LED blink) ───────────────────
CONFIG_DK_LIBRARY=y
CONFIG_HWINFO=y
CONFIG_BT_MESH_DK_PROV=y

# ── Shell 스택 크기 (sensor get 시 BUS FAULT 방지) ───────────────────────────
CONFIG_SHELL_STACK_SIZE=4096

# ── Logging ──────────────────────────────────────────────────────────────────
CONFIG_LOG=y
